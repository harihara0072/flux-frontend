<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/flux-favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flux — Money, in motion</title>
    <script>
      // Apply saved theme before React mounts, to avoid a flash of the
      // wrong theme. Default is light when nothing is saved yet — this
      // intentionally does NOT read prefers-color-scheme, since Flux
      // opens light-first regardless of OS setting.
      (function () {
        try {
          var saved = localStorage.getItem('flux-theme');
          var theme = saved === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
